<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>위하고 사업소득 변환기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕',sans-serif;background:#f5f6fa;min-height:100vh;padding:32px 16px;color:#1a1a2e}
.container{max-width:640px;margin:0 auto}
h1{font-size:20px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.sub{font-size:13px;color:#6b7280;margin-bottom:28px}
.card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-title{font-size:12px;font-weight:700;color:#6b7280;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.badge{width:20px;height:20px;border-radius:50%;background:#3b5bdb;color:#fff;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:600;color:#374151}
.field label .req{color:#ef4444;margin-left:2px}
input,select{font-size:13px;border:1px solid #d1d5db;border-radius:8px;padding:8px 10px;background:#fff;color:#1a1a2e;width:100%;transition:border .15s}
input:focus,select:focus{outline:none;border-color:#3b5bdb;box-shadow:0 0 0 3px rgba(59,91,219,.1)}

/* 파일 드롭존 */
.dropzone{border:2px dashed #d1d5db;border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.dropzone:hover,.dropzone.drag{border-color:#3b5bdb;background:#eef2ff}
.dropzone .icon{font-size:32px;margin-bottom:8px}
.dropzone p{font-size:13px;color:#6b7280}
.dropzone p strong{color:#3b5bdb}
.dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer}

/* 파일 선택됨 */
.file-selected{display:none;align-items:center;gap:10px;padding:10px 14px;background:#eef2ff;border-radius:8px;margin-top:10px}
.file-selected .fname{flex:1;font-size:13px;font-weight:600;color:#1a1a2e}
.file-selected .fsize{font-size:11px;color:#6b7280}
.file-selected .rm{cursor:pointer;color:#9ca3af;font-size:16px;padding:0 2px}
.file-selected .rm:hover{color:#ef4444}

/* 버튼 */
.btn-convert{width:100%;padding:13px;background:#3b5bdb;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-convert:hover{background:#2f4ac7}
.btn-convert:disabled{background:#9ca3af;cursor:not-allowed}

/* 결과 */
.result-box{display:none;margin-top:16px}
.result-inner{background:#ecfdf5;border:1px solid #6ee7b7;border-radius:10px;padding:20px}
.result-title{font-size:14px;font-weight:700;color:#065f46;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.metric{background:#fff;border-radius:8px;padding:10px;text-align:center;border:1px solid #d1fae5}
.metric .mn{font-size:18px;font-weight:700;color:#065f46}
.metric .ml{font-size:11px;color:#6b7280;margin-top:2px}
.btn-dl{width:100%;padding:11px;background:#059669;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none}
.btn-dl:hover{background:#047857}

/* 경고 */
.warn-box{background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:10px 12px;font-size:12px;color:#92400e;margin-top:8px}
.err-box{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:10px 12px;font-size:12px;color:#7f1d1d;margin-top:10px}

/* 스피너 */
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
  <h1>위하고 사업소득 변환기</h1>
  <p class="sub">거래처 급여 엑셀 → 위하고 SmartA 사업소득자료입력 양식</p>

  <!-- Step 1: 기본 설정 -->
  <div class="card">
    <div class="card-title"><span class="badge">1</span>기본 설정</div>
    <div class="g2" style="margin-bottom:12px">
      <div class="field">
        <label>귀속년월<span class="req">*</span></label>
        <input type="month" id="attr-month" />
      </div>
      <div class="field">
        <label>지급년월일<span class="req">*</span></label>
        <input type="date" id="pay-date" />
      </div>
    </div>
    <div class="field" style="margin-bottom:12px">
      <label>소득구분<span class="req">*</span></label>
      <select id="income-type">
        <option value="">-- 선택 --</option>
        <optgroup label="의료/요양">
          <option value="병의원">병의원</option>
          <option value="간병인">간병인</option>
        </optgroup>
        <optgroup label="교육">
          <option value="학원강사">학원강사</option>
          <option value="방과후강사">방과후강사</option>
          <option value="학습지방문강사">학습지방문강사</option>
          <option value="교육교구방문강사">교육교구방문강사</option>
        </optgroup>
        <optgroup label="IT/전문직">
          <option value="소프트웨어프리랜서">소프트웨어프리랜서</option>
          <option value="자문/고문">자문/고문</option>
          <option value="저술가">저술가</option>
        </optgroup>
        <optgroup label="배달/운전">
          <option value="대리운전">대리운전</option>
          <option value="퀵서비스">퀵서비스</option>
          <option value="물품배달">물품배달</option>
          <option value="음료배달">음료배달</option>
          <option value="어린이통학버스기사">어린이통학버스기사</option>
        </optgroup>
        <optgroup label="판매/영업">
          <option value="보험설계">보험설계</option>
          <option value="방판/외판">방판/외판</option>
          <option value="다단계판매">다단계판매</option>
          <option value="대출모집인">대출모집인</option>
          <option value="신용카드회원모집인">신용카드회원모집인</option>
          <option value="중고자동차판매원">중고자동차판매원</option>
          <option value="기타모집수당">기타모집수당</option>
        </optgroup>
        <optgroup label="예술/스포츠">
          <option value="화가관련">화가관련</option>
          <option value="작곡가">작곡가</option>
          <option value="배우">배우</option>
          <option value="모델">모델</option>
          <option value="가수">가수</option>
          <option value="성악가">성악가</option>
          <option value="1인미디어콘텐츠창작자">1인미디어콘텐츠창작자</option>
          <option value="연예보조">연예보조</option>
          <option value="직업운동가">직업운동가</option>
          <option value="바둑기사">바둑기사</option>
          <option value="캐디">캐디</option>
        </optgroup>
        <optgroup label="기타">
          <option value="행사도우미">행사도우미</option>
          <option value="심부름용역">심부름용역</option>
          <option value="목욕관리사">목욕관리사</option>
          <option value="봉사료수취자">봉사료수취자</option>
          <option value="대여제품방문점검원">대여제품방문점검원</option>
          <option value="관광통역안내사">관광통역안내사</option>
          <option value="꽃꽂이교사">꽃꽂이교사</option>
          <option value="기타인적용역자">기타인적용역자</option>
        </optgroup>
      </select>
    </div>
    <div class="g2">
      <div class="field">
        <label>세율</label>
        <select id="tax-rate">
          <option value="3.3" selected>3.3% (사업소득 일반)</option>
          <option value="8.8">8.8%</option>
          <option value="22">22% (비거주자)</option>
        </select>
      </div>
      <div class="field">
        <label>내·외국인구분</label>
        <select id="foreigner">
          <option value="0" selected>0. 내국인</option>
          <option value="1">1. 외국인</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Step 2: 파일 업로드 -->
  <div class="card">
    <div class="card-title"><span class="badge">2</span>급여 파일 업로드</div>
    <div class="dropzone" id="dropzone">
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv" />
      <div class="icon">📂</div>
      <p><strong>클릭하여 파일 선택</strong> 또는 여기에 드래그</p>
      <p style="margin-top:4px;font-size:11px">xlsx · xls · csv 지원 · 성명·주민번호·급여 자동 추출</p>
    </div>
    <div class="file-selected" id="file-selected">
      <span style="font-size:18px">📄</span>
      <span class="fname" id="fname"></span>
      <span class="fsize" id="fsize"></span>
      <span class="rm" onclick="clearFile()">✕</span>
    </div>
  </div>

  <!-- 변환 버튼 -->
  <button class="btn-convert" id="btn-convert" onclick="doConvert()" disabled>
    <div class="spinner" id="spinner"></div>
    <span id="btn-text">변환하기</span>
  </button>
  <div id="err-msg"></div>

  <!-- 결과 -->
  <div class="result-box" id="result-box">
    <div class="result-inner">
      <div class="result-title">✅ 변환 완료</div>
      <div class="metrics" id="metrics"></div>
      <a class="btn-dl" id="dl-link" href="#" download>📥 위하고 양식 다운로드 (xlsx)</a>
    </div>
    <div id="warns"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
let selectedFile = null;

// 드래그앤드롭
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
document.getElementById('file-input').addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file) return;
  selectedFile = file;
  document.getElementById('fname').textContent = file.name;
  document.getElementById('fsize').textContent = (file.size / 1024).toFixed(1) + ' KB';
  document.getElementById('file-selected').style.display = 'flex';
  checkReady();
}
function clearFile() {
  selectedFile = null;
  document.getElementById('file-input').value = '';
  document.getElementById('file-selected').style.display = 'none';
  checkReady();
  document.getElementById('result-box').style.display = 'none';
}
function checkReady() {
  const ok = selectedFile &&
    document.getElementById('attr-month').value &&
    document.getElementById('pay-date').value &&
    document.getElementById('income-type').value;
  document.getElementById('btn-convert').disabled = !ok;
}
['attr-month','pay-date','income-type'].forEach(id =>
  document.getElementById(id).addEventListener('change', checkReady));

// ── 데이터 추출 ──
function is33Rate(v) {
  if (v == null) return false;
  if (typeof v === 'number') return Math.abs(v - 0.033) < 0.001;
  const s = String(v).replace(/\s/g,'');
  return s === '3.3%' || s === '0.033' || s === '3.3';
}
function is4dae(v) {
  if (v == null) return false;
  const s = String(v).replace(/\s/g,'');
  return s.includes('4대') || s.includes('4大') || s === '4대보험';
}

function extractData(wb) {
  const nameHints = ['성명','이름','소득자명','name'];
  const rrnHints  = ['주민등록번호','주민번호','주민','rrn','등록번호'];
  const amtHints  = ['금액','급여','지급총액','총급여','지급액','기본급','금  액','지  급'];
  const insHints  = ['4대보험','보험구분','고용형태','세율','구분'];

  let best = null;

  for (const shName of wb.SheetNames) {
    const ws = wb.Sheets[shName];
    const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:true});

    let headerIdx = -1, ni = -1, ri = -1, ai = -1, ii = -1;

    for (let i = 0; i < Math.min(raw.length, 15); i++) {
      const vals = (raw[i] || []).map(v => v == null ? '' : String(v).replace(/\s/g,''));
      let foundName = false;
      for (let j = 0; j < vals.length; j++) {
        if (ni < 0 && nameHints.some(h => vals[j] === h)) { ni = j; foundName = true; }
        if (ri < 0 && rrnHints.some(h => vals[j].includes(h))) ri = j;
        if (ai < 0 && amtHints.some(h => vals[j] === h)) ai = j;
        if (ii < 0 && insHints.some(h => vals[j].includes(h))) ii = j;
      }
      if (foundName) { headerIdx = i; break; }
    }

    if (headerIdx < 0 || ni < 0 || ri < 0) continue;

    // 금액 컬럼 못 찾으면 숫자 최대값 컬럼 자동 탐색
    if (ai < 0) {
      const colSums = {};
      for (let i = headerIdx + 1; i < raw.length; i++) {
        const row = raw[i] || [];
        for (let j = 0; j < row.length; j++) {
          if (typeof row[j] === 'number' && row[j] > 1000) {
            colSums[j] = (colSums[j] || 0) + row[j];
          }
        }
      }
      let maxSum = 0;
      for (const [j, s] of Object.entries(colSums)) {
        if (+j !== ni && +j !== ri && +j !== ii && s > maxSum) { maxSum = s; ai = +j; }
      }
    }

    // 4대보험 혼재 여부 감지
    let has4dae = false, has33 = false;
    for (let i = headerIdx + 1; i < raw.length; i++) {
      const row = raw[i];
      if (!row || ii < 0) continue;
      if (is4dae(row[ii])) has4dae = true;
      if (is33Rate(row[ii])) has33 = true;
    }
    const mixedMode = has4dae && has33; // 혼재 파일

    const data = [];
    let skipped4dae = 0;
    for (let i = headerIdx + 1; i < raw.length; i++) {
      const row = raw[i];
      if (!row || !row.some(v => v != null)) continue;
      const name = row[ni] != null ? String(row[ni]).trim() : '';
      if (!name || !/[\uAC00-\uD7A3]/.test(name)) continue;
      const rrnRaw = row[ri] != null ? String(row[ri]).trim() : '';
      const rrn = rrnRaw.replace(/[^0-9]/g, '');
      if (rrn.length < 7) continue;

      // 혼재 파일이면 3.3%만 추출, 4대보험은 건너뜀
      if (mixedMode && ii >= 0) {
        if (is4dae(row[ii])) { skipped4dae++; continue; }
        if (!is33Rate(row[ii])) continue; // 둘 다 아니면 제외
      }

      let amt = 0;
      if (ai >= 0 && row[ai] != null) {
        const v = row[ai];
        amt = typeof v === 'number' ? Math.round(v) : parseInt(String(v).replace(/[^0-9]/g,'')) || 0;
      }
      data.push({name, rrn, amt});
    }

    if (skipped4dae > 0) data._skipped4dae = skipped4dae;
    if (data.length > (best ? best.length : 0)) best = data;
  }
  return best || [];
}

// ── 위하고 xlsx 생성 ──
function makeWihagoXlsx(data, attrYm, payDate, incomeType, taxRateStr, foreigner) {
  const taxRate = parseFloat(taxRateStr);
  const incomeTaxRate = taxRate * (10/11) / 100;
  const localTaxRate  = taxRate * (1/11)  / 100;

  const headers = [
    '귀속년월','지급년월일','소득자명','주민등록번호','소득구분',
    '내.외국인구분','지급총액','세율(%)','소득세','지방소득세',
    '세액계','차인지급액','연말정산','기본주소','상세주소','영수일자'
  ];

  const rows = [headers];
  let warns = [];

  data.forEach(d => {
    const rrn13 = d.rrn.substring(0, 13);
    if (rrn13.length < 13) warns.push(`${d.name}: 주민번호 ${rrn13.length}자리 (확인 필요)`);
    const rrnFmt = rrn13.length >= 13 ? `${rrn13.slice(0,6)}-${rrn13.slice(6)}` : d.rrn;

    // 소득세: 10원 단위 절사 (ROUNDDOWN)
    const incomeTax = Math.floor(d.amt * incomeTaxRate / 10) * 10;
    const localTax  = Math.floor(d.amt * localTaxRate  / 10) * 10;
    const taxSum    = incomeTax + localTax;

    rows.push([
      attrYm, payDate, d.name, rrnFmt, incomeType,
      foreigner, d.amt, taxRate, incomeTax, localTax,
      taxSum, d.amt - taxSum, '부', '', '', payDate
    ]);
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);

  // 컬럼 너비
  ws['!cols'] = [
    {wch:10},{wch:12},{wch:10},{wch:18},{wch:18},
    {wch:8},{wch:12},{wch:8},{wch:10},{wch:10},
    {wch:10},{wch:12},{wch:6},{wch:20},{wch:20},{wch:12}
  ];
  ws['!freeze'] = {xSplit:0, ySplit:1};

  XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
  return {wb, warns};
}

// ── 변환 실행 ──
async function doConvert() {
  const btn = document.getElementById('btn-convert');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btn-text');
  const errDiv = document.getElementById('err-msg');

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = '변환 중...';
  errDiv.innerHTML = '';
  document.getElementById('result-box').style.display = 'none';

  try {
    const buf = await selectedFile.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array', codepage:949, cellDates:true, raw:false});
    const data = extractData(wb);

    if (!data.length) throw new Error('성명·주민번호·급여 컬럼을 찾을 수 없습니다. 헤더 행에 "성명", "주민등록번호", "금액"(또는 "급여") 이 포함되어 있는지 확인해 주세요.');

    const attrYm  = document.getElementById('attr-month').value.replace('-','');
    const payDate = document.getElementById('pay-date').value.replace(/-/g,'');
    const incomeType = document.getElementById('income-type').value;
    const taxRate = document.getElementById('tax-rate').value;
    const foreigner = document.getElementById('foreigner').value;

    const {wb: outWb, warns} = makeWihagoXlsx(data, attrYm, payDate, incomeType, taxRate, foreigner);

    // 다운로드
    const fname = `위하고_사업소득_${attrYm}.xlsx`;
    const wbout = XLSX.write(outWb, {bookType:'xlsx', type:'array'});
    const blob = new Blob([wbout], {type:'application/octet-stream'});
    const url = URL.createObjectURL(blob);
    const dlLink = document.getElementById('dl-link');
    dlLink.href = url;
    dlLink.download = fname;

    // 메트릭
    const skipped4dae = data._skipped4dae || 0;
    const totalAmt = data.reduce((s,d) => s+d.amt, 0);
    const totalTax = data.reduce((s,d) => {
      const it = Math.floor(d.amt * parseFloat(taxRate) * (10/11) / 100 / 10) * 10;
      const lt = Math.floor(d.amt * parseFloat(taxRate) * (1/11)  / 100 / 10) * 10;
      return s + it + lt;
    }, 0);
    document.getElementById('metrics').innerHTML = [
      {n: data.length + '명', l:'3.3% 대상 인원'},
      {n: totalAmt.toLocaleString() + '원', l:'지급총액 합계'},
      {n: totalTax.toLocaleString() + '원', l:'세액 합계'},
    ].map(m => `<div class="metric"><div class="mn">${m.n}</div><div class="ml">${m.l}</div></div>`).join('');

    // 경고
    const allWarns = [...warns];
    if (skipped4dae > 0) allWarns.unshift(`__4dae__4대보험 직원 ${skipped4dae}명 자동 제외 — 3.3% 대상자만 추출`);
    document.getElementById('warns').innerHTML = allWarns.map(w => {
      const is4d = w.startsWith('__4dae__');
      const msg = is4d ? w.replace('__4dae__','') : w;
      return `<div style="background:${is4d?'#eff6ff':'#fffbeb'};border:1px solid ${is4d?'#93c5fd':'#fcd34d'};border-radius:8px;padding:10px 12px;font-size:12px;color:${is4d?'#1e40af':'#92400e'};margin-top:8px">${is4d?'ℹ️':'⚠️'} ${msg}</div>`;
    }).join('');

    document.getElementById('result-box').style.display = 'block';

  } catch(e) {
    errDiv.innerHTML = `<div class="err-box">❌ ${e.message}</div>`;
  }

  btn.disabled = false;
  spinner.style.display = 'none';
  btnText.textContent = '변환하기';
  checkReady();
}
</script>
</body>
</html>
